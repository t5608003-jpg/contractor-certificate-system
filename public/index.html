<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>承攬商證照查詢系統</title>
</head>

<body>

<h2>承攬商證照查詢系統</h2>

<h3>上傳證照資料 (CSV / Excel)</h3>

<input type="file" id="fileInput">
<button onclick="upload()">上傳</button>

<p id="status"></p>

<hr>

<h3>資料查詢</h3>

<input id="keyword" placeholder="輸入 單位 / 姓名 / 證照關鍵字">

<select id="expiry">
<option value="">全部</option>
<option value="expired">已過期</option>
<option value="month">當月到期</option>
<option value="1">1個月內到期</option>
<option value="2">2個月內到期</option>
<option value="3">3個月內到期</option>
</select>

<button onclick="search()">查詢</button>

<br><br>

<table border="1">

<thead>
<tr>
<th>單位</th>
<th>姓名</th>
<th>證照名稱</th>
<th>證號</th>
<th>到期日</th>
</tr>
</thead>

<tbody id="result"></tbody>

</table>

<script src="app.js"></script>

</body>
</html>
