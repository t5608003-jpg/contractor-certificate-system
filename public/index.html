<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>承攬商進廠查詢系統</title>

<style>

body{
font-family: Arial;
margin:40px;
}

h1{
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin:5px;
}

table{
border-collapse: collapse;
margin-top:20px;
width:100%;
}

th,td{
padding:8px;
text-align:left;
border:1px solid #ccc;
}

th{
background:#f0f0f0;
}

#count{
margin-top:10px;
font-weight:bold;
}

</style>

</head>


<body>

<h1>承攬商進廠查詢系統</h1>


<!-- 檔案上傳 -->

<h3>上傳證照資料 (CSV / Excel)</h3>

<input type="file" id="file">

<button onclick="upload()">上傳</button>

<div id="uploadMsg"></div>

<div id="count"></div>



<hr>



<!-- 查詢 -->

<h3>資料查詢</h3>

<input id="keyword" placeholder="輸入 單位 / 姓名 / 證照關鍵字">

<select id="expiry">
<option value="">全部</option>
<option value="expired">已過期</option>
<option value="month">當月到期</option>
<option value="1">1個月內到期</option>
<option value="2">2個月內到期</option>
<option value="3">3個月內到期</option>
</select>

<button onclick="search()">查詢</button>



<!-- 查詢結果 -->

<table>

<thead>
<tr>
<th>單位</th>
<th>姓名</th>
<th>證照名稱</th>
<th>證號</th>
<th>到期日</th>
</tr>
</thead>

<tbody id="result"></tbody>

</table>



<script src="/app.js"></script>

</body>

</html>
