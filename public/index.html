<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>承攬商證照查詢系統</title>
</head>

<body>

<h2>證照資料上傳</h2>

<input type="file" id="file">
<button onclick="upload()">上傳</button>

<p id="msg"></p>

<hr>

<h2>資料查詢</h2>

<input id="keyword" placeholder="輸入 廠別 / 單位 / 姓名 / 證照">

<select id="expiry">
<option value="">全部</option>
<option value="expired">已過期</option>
<option value="month">當月到期</option>
<option value="1">1個月內到期</option>
<option value="2">2個月內到期</option>
<option value="3">3個月內到期</option>
</select>

<button onclick="search()">查詢</button>

<br><br>

<table border="1">

<thead>

<tr>

<th>廠別</th>
<th>單位/部門</th>
<th>姓名</th>
<th>證照</th>
<th>證號</th>
<th>到期日</th>
<th>課程安排</th>

</tr>

</thead>

<tbody id="result"></tbody>

</table>

<script src="app.js"></script>

</body>
</html>
